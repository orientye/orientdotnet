package cn.jj.service.msg.protocol;
//option optimize_for = CODE_SIZE;
//option optimize_for = LITE_RUNTIME;
message LordReqMsg  {
	required uint32 matchid = 1;
//	optional uint32 gameid = 2;
	optional LordCallScoreReq lordcallscore_req_msg = 3;
	optional LordTakeoutCardReq lordtakeoutcard_req_msg = 4;
	optional LordTrustReq lordtrust_req_msg = 5;
	optional LordCancelRoundReq lordcancelround_req_msg = 6;
	optional LordCheckTimeOutReq lordchecktimeout_req_msg = 7;
	optional LordForceDeclareLoadReq lordforcedeclareload_req_msg = 8; //霸王叫确定叫地主
	optional LordLordGiveUpReq lord_give_up_req_msg = 9; // 地主认输
	optional LordKickReq   lord_kick_req_msg   = 10; //踢
	optional LordClientReadyReq lordclientready_req_msg = 11; //客户端准备好，通知游戏服务
	optional uint32 triggertype = 12;	//客户端触发类型
	optional LordClientGetTipReq lord_clientgettip_req_msg = 13;	//客户端请求游戏服务提示 GC->GS
	optional LordSvr2BotGetTipReq lord_svr2botgettip_req_msg = 14; 	//游戏服务请求机器人提示返回结果 BOT->GS
	optional LordRePlayReq	lord_replay_req_msg = 15;				//客户端请求重玩 GC->GS
	optional GiveUpReq	giveup_req_msg	= 16; //农民认输 GC->GS
	optional HeartbeatTimeChangeReq lord_heartbeattimechange_req_msg = 17; //心跳包时间变化确认消息
	optional HeartbeatMsgReq lord_heartbeat_req_msg = 18;   //心跳包
	optional LordShowCardsReq lord_showcards_req_msg = 19; //直赢摊牌
	optional LordOperateEndReq	lordoperateend_req_msg = 20; //客户端动画结束
	optional LordPassByOtherReq	lordpassbyother_req_msg = 21; //替他人pass
	optional LordClientTriggerReq lord_clienttrigger_req_msg = 22; //客户端触发情感点请求
	optional LordHintChooseReq lord_hintchoose_req_msg = 23;	// 选择AI支招请求
}

message LordAckMsg  {
	required uint32 matchid = 1;
//	optional uint32 gameid = 2;
	optional LordCallScoreAck lordcallscore_ack_msg = 3;
	optional LordTakeoutCardAck lordtakeoutcard_ack_msg = 4;
	optional LordTrustAck lordtrust_ack_msg = 5;
	optional LordInitCardAck lordinitcard_ack_msg = 6;
	optional LordInitBottomCardAck lordinitbottomcard_ack_msg = 7;
	optional LordResultAck lordresult_ack_msg = 8;
	optional LordTipMsgAck lordtipmsg_ack_msg = 9;
	optional LordEmptyAck lordempty_ack_msg = 10;
	optional LordChangeTakeoutTimeAck lordchangetakeouttime_ack_msg = 11;
	optional LordChangeInfoAck lordchangeinfo_ack_msg = 12;
	optional LordNickNameAck lordnickname_ack_msg = 13;
	optional LordForceCallAck lordforcecall_ack_msg = 14; //霸王叫
	optional LordForceCallShowCardAck lordforceshowcardcall_ack_msg = 15; //发霸王叫明牌消息
	optional LordForceDeclareLoadAck lordforcedeclareload_ack_msg = 16; //霸王叫确定叫地主
	optional LordUpdateMultiAck lordupdatemulti_ack_msg = 17; //更新倍数消息
	optional LordGameStartAck	lordgamestart_ack_msg	= 18;//游戏开始消息
	optional LordWaitClientReadyAck lordwaitclientready_ack_msg = 19;	//开始等待客户端准备好
	optional LordOperateStartAck	lordoperatestart_ack_msg = 20; //操作开始
	optional LordKickAck   lordkick_ack_msg	= 21;  //踢消息
	optional LordOperateResultAck lordoperateresult_ack_msg = 22; //操作结果
	optional uint64 timeStamp = 23; //时间戳, 下面这些消息会带时间戳LordCallScoreAck,LordTakeoutCardAck,LordInitCardAck
	                               // LordForceCallAck,LordOperateStartAck,LordOperateResultAck
								   // LordGameStartAck,LordWaitClientReadyAck
	optional LordInitEndGameCardAck  lord_initendgamecard_ack_msg = 24;	//残局的发牌消息 GS->GC
	optional LordSvr2BotGetTipAck	 lord_svr2botgettip_ack_msg = 25;	//游戏服务请求机器人获取提示信息 GS->BOT
	optional LordClientGetTipAck	lord_clientgettip_ack_msg = 26;		//客户端请求游戏服务提示返回结果 GS->GC
	optional LordSvrTipStateAck		lord_svrtipstate_ack_msg = 27;		//服务提示状态
	optional GiveUpAck giveup_ack_msg	= 28;	//认输
	optional LordReBackInfoAck      lord_rebackinfo_ack_msg = 29;	//恢复牌局的信息
	optional HeartbeatTimeChangeAck lord_heartbeattimechange_ack_msg = 30; //心跳包时间变化消息
	optional HeartbeatMsgAck        lord_heartbeat_ack_msg = 31; //心跳包确认
	optional LordShowCardsAck lord_showcards_ack_msg = 32; //直赢摊牌确认
	optional LordClientTriggerAck   lord_clienttrigger_ack_msg = 33; ////客户端触发情感点回复
	optional LordPlayerRankInfoAck  lord_playerrankinfo_ack_msg = 34; //玩家排名等信息
	optional LordHintConfigAck      lord_hintconfig_ack_msg = 35;		// AI支招配置
	optional LordHintChooseAck		lord_hintchoose_ack_msg = 36;		// 选择AI支招响应
	optional LordHintAck 			lord_hint_ack_msg = 37;				// AI支招提示结果
	optional LordHintRefundAck		lord_Hintrefund_ack_msg = 38;		// AI支招退费
    optional LordAddPlayerChipAck lord_addplayerchip_ack_msg = 39; //增加玩家筹码
	optional LordSvr2BotRecordAck lord2bot_record_ack_msg = 40; //推送录像数据
	optional LordHunterResultAck lord_hunterresult_ack_msg = 41; //猎人赛单局打完的结果数据
	optional RecommendCallScoreAck recommendcallscore_ack_msg = 42; //推荐叫分
}

//操作结果结构
message OperateResult{
	required 	uint32 	seat 			= 1;	//座位号
	required 	uint32 	result 			= 2;	//结果
}

message CardInfo{
	required	uint32 	seat		= 1;	//座位号
	required	bytes 	cards		= 2;	//牌张
}

message LordCallScoreReq  {
	optional uint32 nextcallseat = 1;
	required uint32 curcallseat = 2;
	required uint32 curscore = 3;
	optional uint32 validatescore = 4;
}

message LordCallScoreAck  {
	required uint32 nextcallseat = 1;
	required uint32 curcallseat = 2;
	required uint32 curscore = 3;
	required uint32 validatescore = 4;
}

message LordTakeoutCardReq  {
	required uint32 seat = 1;
	optional uint32 nextplayer = 2;
	optional uint32 passplayer = 3;
	optional uint32 multiple = 4;
	required bool isover = 6;
	required bytes cards = 7;
	optional uint32 msgcnt = 8; //出牌消息的消息序号
	optional uint32 identity = 9; //出牌者身份 玩家0，客户端1
}

message LordTakeoutCardAck  {
	required uint32 seat = 1;
	required uint32 nextplayer = 2;
	required int32 passplayer = 3;
	optional uint32 multiple = 4;
	required bool isover = 6;
	required bytes cards = 7;
	optional bool nextautogo = 8;	//下一个玩家是否最后一手牌服务帮忙自动打出
	optional uint32 msgcnt = 9;	//出牌消息的消息序号
	optional bool nextautopass = 10; //下一个玩家是否游戏服务自动pass
	repeated uint32 cardcount = 11 [packed=true]; // isover = true时下发 玩家数量
	optional bytes remaincards = 12; //isover = true 时下发 剩余手牌
    optional string strmultiple =13; //倍数字符串
}

message LordTrustReq  {
	required uint32 seat = 1;
	required uint32 trust = 2;
	required uint32 userid = 3;
}

message LordTrustAck  {
	required uint32 seat = 1;
	required uint32 trust = 2;
	optional uint32 userid = 3;
}

message LordCancelRoundReq  {
  optional uint32 nullvalue = 1;
}

message LordInitCardAck  {
	required uint32 firstcallseat = 1;
	optional uint32 firstinitcard = 2;
	required bytes cards = 3;
    optional uint32 recommendscore = 4;    //推荐给玩家的叫分值
	optional string testrecordid = 5;
}

message LordInitBottomCardAck  {
	required uint32 lordseat = 1;
	optional uint32 firstfarmerseat = 2;
	required uint32 bottomscore = 3;
	required bytes cards = 4;
    optional uint32 businessId = 5;
    optional string businessData = 6;
}

message LordResultAck  {
	repeated int32 score = 1 [packed=true];
	required uint32 winseat = 2;
	repeated uint32 cardcount = 3 [packed=true];
	required uint32 spring = 4;
	required bytes  cards = 5;
	optional bool   islordgiveup = 6;
	optional uint32 giveupfigure = 7;  //认输结果（无认输没有此项，1-地主认输， 2-农民认输）
	optional uint32 businessId = 8;
    optional string businessData = 9;
}

message LordTipMsgAck  {
	required string tip = 1;
}

message LordEmptyAck  {
	repeated uint32 scores = 1[packed=true];
	optional bytes  cards = 2;
}

message LordChangeTakeoutTimeAck  {
	required uint32 seat = 1;
	required uint32 takeouttime = 2;
}

message LordChangeInfoAck  {
	required uint32 score0 = 1;
	required uint32 score1 = 2;
	required uint32 score2 = 3;
	required uint32 gamehand = 4;
}

message LordNickNameAck {
	repeated string nicks = 1;
}

message LordCheckTimeOutReq {
	optional uint32 nullvalue = 1;
}

message LordForceDeclareLoadReq {
	required int32 seat = 1; //霸王叫的玩家座位号
	required int32 iscall = 2; //当前叫或不叫[1:叫; 0:不叫]
}

message LordForceDeclareLoadAck {
	required int32 seat = 1; //霸王叫的玩家座位号
	required int32 iscall = 2; //当前叫或不叫[1:叫; 0:不叫]
}

message LordForceCallAck {
	required int32 seat = 1; //霸王叫的玩家座位号
	required bytes cards = 2; //后缀牌
}

message LordForceCallShowCardAck{
	required int32 seat = 1; //地主是谁,明的牌
	required bytes cards = 2; //后缀牌
}

message LordUpdateMultiAck {
	required int32 isspring = 1; //是否春天[1:是春天,0:不是]
	required int32 bombcount = 2; //炸弹个数
	required int32 rocketcount = 3; //火箭个数
	optional int32 curmulti = 4; //当前游戏总倍数
    optional string strmultiple = 5; //浮点数 当前游戏总倍数
}

message LordGameStartAck {
	required uint64 timeStamp =	1;	//时间戳
}

message LordLordGiveUpReq
{
	optional uint32 null = 1;
}

message LordWaitClientReadyAck{
	required uint64 timestamp = 1; //时间戳
}

message LordClientReadyReq{
	required uint32 seat = 1;	//座位号
}

message LordOperateStartAck{
	required uint64 timeStamp =	1;	//时间戳
	repeated uint32	operateType = 2;	//可操作的类型（1-加倍，2-选底牌，100-恢复牌局）
	repeated uint32 seatlist = 3;	//对应可操作的座位列表
	optional string gameAction = 4;	 //游戏数据（录像格式）
}

message LordPassByOtherReq{
	required uint32 seat = 1;
}

message LordOperateEndReq{
	required uint32 operateType = 1;
}

message LordKickReq{
	required uint32 seat = 1;	//踢的人座位号
	required bool kick = 2;		//是否踢
}

message LordKickAck{
	required uint32 seat = 1;	//踢的人座位号
	required bool kick = 2;		//是否踢
}

message LordOperateResultAck{
	required uint64 timestamp = 1; //时间戳
	repeated uint32	operateType = 2;	//可操作的类型
	repeated OperateResult operateResult = 3;	//操作结果
}

message LordSvr2BotGetTipAck{
	required uint32 seat = 1;	//座位号
}

message LordClientGetTipReq{
	required uint32 seat = 1;		//座位号
}

message LordRePlayReq{
	required uint32 seat = 1;		//座位号
}

message LordInitEndGameCardAck{
	required uint32 lordseat 			= 1;	//地主座位号
	required uint32 firstseat 			= 2;	//首出座位号
	required uint32 initcnt				= 3;	//重发牌次数
	repeated CardInfo playercards 		= 4;	//牌张信息
	optional uint32 curMission			= 5;	//当前关卡
}

message LordClientGetTipAck{
	required uint32 seat = 1;	//座位号
	required uint32 result = 2;	//返回结果
	optional bytes  cards = 3;	//获得提示的牌张（如果成功的话）
}

message LordSvr2BotGetTipReq{
	required uint32 seat = 1;	//座位号
	required uint32 result = 2;	//返回结果 0-正常，1-无解，2-异常
	optional bytes  cards = 3;	//获得提示的牌张（如果成功的话）
}

message LordSvrTipStateAck{
	required uint64 timestamp = 1; 	//时间戳
	required uint32 tipstage = 2;	//服务提示的阶段  0-游戏开始，1-霸王叫阶段， 2-叫分阶段，3-出牌阶段
	required uint32 tipflag = 3;	//服务提示的标记  1-开始，2-结束
}

message GiveUpReq{
	required uint32 seat = 1;	//座位号
	required bool	giveup = 2; //是否认输
	required uint32	msgflag = 3;	//消息标记 发起请求时为0，同意或者不同意时为1
}

message GiveUpAck{
	required uint32 seat = 1;	//座位号
	required bool	giveup = 2; //是否认输
	required uint32	msgflag = 3; //消息标记 发起请求时为0，同意或者不同意时为1
	required uint64 timestamp = 4; //时间戳
}

message LordReBackInfoAck{
	required uint32 curseat    = 1;		//当前座位号
	required uint32 firstseat  = 2;		//首叫座位号
	required uint32 curstage   = 3;		//当前阶段
	required uint32 lordseat   = 4;		//地主座位号
	optional string strhand    = 5;		//手牌信息
	optional string strbottom  = 6;		//底牌信息
	optional string strcallhis = 7;		//叫分历史
	optional string strdishis  = 8;		//出牌历史
}

message HeartbeatTimeChangeReq{
	optional uint32 heartbeattime = 1; //预判期心跳检测间隔,
	optional uint32 opheartbeattime = 2; //操作期心跳检测间隔
}

message HeartbeatTimeChangeAck{
	optional uint32 heartbeattime = 1; //预判期下次心跳检测间隔,
	optional uint32 opheartbeattime = 2; //操作期心跳检测间隔,操作期固定1秒
}

message HeartbeatMsgReq{
	optional uint32 msgcnt = 1;//0~127循环
}

message HeartbeatMsgAck{
	optional uint32 msgcnt = 1;
	optional uint32 netstatus = 2; //0强网,1中网,2弱网,3无网
}

message LordShowCardsReq{
	required uint32 seat = 1;
	required uint32 type = 2;	//  1:直赢春天	2:倒数第二手牌直赢摊牌
	required uint32 handnum = 3;//  手数
	repeated bytes cards = 4;	//	出牌列表
}

message LordShowCardsAck{
	required uint32 seat = 1;
	required uint32 type = 2;	// 1:直赢春天	2:倒数第二手牌直赢摊牌
	required uint32 handnum = 3;
	required bool result = 4;	// 服务端Check结果
	repeated bytes cards = 5;	//	出牌列表
}

message LordClientTriggerReq {
    required uint32 type = 1;           // 1.见单直赢，2.见双(对)直赢，3.单双全控，4.倒数N手牌
    required uint32 seat = 2;           // 触发情感点的座位号
    repeated bytes cards = 3;           // 直赢玩家相对于外面的最大牌(如果单双全控,单牌和对子都需要发上来)
}

message LordClientTriggerAck {
    required uint32 type = 1;           // 1.见单直赢，2.见双(对)直赢
    required uint32 seat = 2;           // 触发情感点的座位号
    required uint32 takeoutseat = 3;    // 上一家出牌玩家的座位号
	optional bool result = 4;           // 消息校验结果
}

//历史信息 从第一轮开始到当前轮次
message LordHisInfo{
	optional uint32 seat = 1;//seat玩家的信息
	optional uint32 promotion = 2;	//当前晋级状况，1晋级，2待定，3淘汰
	repeated int32 initscores = 3; //100,200
	repeated int32 endscores = 4; //200,300
	repeated uint32 hisorder = 5;	//历史排名信息
}

message LordPlayerRankInfoAck{
	optional uint32 seat = 1;//发给seat玩家
	repeated LordHisInfo hisinfo = 3; //玩家的这场比赛的历史分数
}

// AI支招协议

//配置信息ack，clientready消息后下发，没有开启支招配置不发这条消息
message LordHintConfigAck{
    required string plan = 1; // json格式，包含支招条件、费用、返费方案
}

//选择支招请求
message LordHintChooseReq{
    required uint32 seat = 1;
    required uint32 type = 2; // 0-关闭支招，1-开启支招
    optional uint32 planid = 3; // 报名费方案id
}

//选择支招应答
message LordHintChooseAck{
    required uint32 seat = 1;
    required uint32 type = 2; // 0-关闭支招，1-开启支招
    required uint32 result = 3; // 0-请求成功，1-未开启支招配置，2-已经开启支招，3-扣费失败，4-局面必败 5-当前不允许选择支招 6-开启支招时间不足 7-支招超时关闭
	optional uint32 planid = 4; // 报名费方案id
}

//支招结果
message LordHintAck{
	required uint32 seat = 1;
	optional bytes cards = 2;
	required uint32 result = 3; // 0-请求成功，1-请求失败
}

//支招退费
message LordHintRefundAck{
	required uint32 seat = 1;
	required uint64 cost = 2; // 退费金额
	required uint32 type = 3; // 1-完全按支招出牌但是失败，2-AI计算超时，3-牌局必败，4-AI未能提示
}

message LordAddPlayerChipAck{
    required uint32 seat = 1;
    required string addchip = 2;
    required string finalchip = 3;
}

//推送录像数据
message LordSvr2BotRecordAck{
    required string record = 1;
}

message LordHunterResultAck{
	repeated uint32 huntedseat = 1; //被猎杀淘汰的座位号
    repeated uint32 winseat = 2; //获胜方座位号
}


//推荐叫分序列
message RecommendCallData{
	required 	uint32 	validscore			= 1;	//当前的有效叫分
	required 	uint32 	recommendscore		= 2;	//当前有效叫分下推荐叫几分
}

message RecommendCallScoreAck{
	required uint32 seat = 1;
	repeated RecommendCallData recommendseq = 2;    //推荐分数
}